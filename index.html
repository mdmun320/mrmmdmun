<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Chem Explorer - Pro Responsive Edition</title>
    <style>
        :root { 
            --neon-blue: #00d2ff; 
            --neon-purple: #9d00ff;
            --glass: rgba(15, 15, 35, 0.85);
            --accent: #ff0055;
            --bg-dark: #050510;
            /* রেসপন্সিভ ফন্ট সাইজ */
            --font-main: clamp(14px, 2vw, 18px);
            --font-title: clamp(20px, 4vw, 28px);
        }
        
        body { margin: 0; background-color: var(--bg-dark); overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; color: white; }
        canvas { display: block; width: 100% !important; height: 100% !important; }

        /* --- Sidebar & UI --- */
        #menu-icon {
            position: absolute; top: 15px; left: 15px; z-index: 101; cursor: pointer;
            background: var(--glass); padding: 10px; border-radius: 10px; border: 1px solid var(--neon-blue);
        }
        .bar { width: 22px; height: 2px; background: var(--neon-blue); margin: 4px 0; }

        #sidebar {
            position: fixed; top: 0; left: -100%; width: 100%; max-width: 300px; height: 100%;
            background: rgba(10, 10, 30, 0.98); backdrop-filter: blur(20px);
            z-index: 200; transition: 0.4s ease; border-right: 2px solid var(--neon-blue); padding: 20px; box-sizing: border-box;
        }
        #sidebar.active { left: 0; }

        .sidebar-title { color: var(--neon-blue); font-size: 1.2rem; margin-bottom: 20px; border-bottom: 1px solid rgba(0, 210, 255, 0.2); }
        
        .nav-btn {
            display: block; width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px;
            background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; text-decoration: none; font-size: 15px; transition: 0.3s;
        }
        .nav-btn:hover { background: var(--neon-purple); padding-left: 15px; }

        /* --- Search Bar (Responsive) --- */
        #search-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 100; width: 70%; max-width: 450px;
        }
        #el-search {
            width: 100%; padding: 12px 20px; border-radius: 25px; border: 2px solid var(--neon-blue);
            font-size: var(--font-main); background: rgba(0, 0, 0, 0.6); color: white; outline: none;
        }

        /* --- Reaction Lab Overlay (Fully Responsive) --- */
        #lab-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 300; display: none; overflow-y: auto;
            padding: 20px; box-sizing: border-box;
        }
        .reaction-container { max-width: 900px; margin: 0 auto; text-align: center; }
        
        /* ফ্লেক্সিবল গ্রিড */
        .box-grid { 
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center; 
            gap: 10px; margin-top: 20px; 
        }
        .chem-box {
            width: clamp(80px, 20vw, 120px); height: clamp(80px, 20vw, 120px);
            border: 2px dashed var(--neon-blue); border-radius: 15px; background: rgba(255,255,255,0.05);
            text-align: center; color: white; font-size: 16px;
        }
        .result-box {
            width: clamp(140px, 35vw, 200px); height: clamp(80px, 20vw, 120px);
            border: 2px solid var(--neon-purple); background: rgba(157, 0, 255, 0.1);
            border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        #reaction-3d-canvas { 
            width: 100%; height: clamp(200px, 40vh, 400px); 
            background: #000; border-radius: 15px; margin-top: 20px; 
        }

        /* --- Data Display (Mobile Optimized) --- */
        #data-display {
            position: absolute; bottom: 20px; right: 20px; width: 300px;
            background: var(--glass); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); display: none; z-index: 90;
        }

        /* মোবাইল স্ক্রিনের জন্য মিডিয়া কোয়েরি */
        @media (max-width: 600px) {
            #data-display { 
                bottom: 0; left: 0; width: 100%; border-radius: 20px 20px 0 0; 
                padding: 15px; box-sizing: border-box;
            }
            #search-container { width: 60%; left: 55%; }
            .box-grid { gap: 5px; }
            .sidebar-title { font-size: 1rem; }
        }
        

    </style>
</head>
<body>

<div id="menu-icon" onclick="toggleSidebar()">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
</div>

<div id="sidebar">
    <span onclick="toggleSidebar()" style="position: absolute; right: 15px; top: 15px; color: var(--accent); font-size: 25px; cursor: pointer;">&times;</span>
    <div class="sidebar-title">Menu</div>
    <button class="nav-btn" onclick="closeLab(); showSection('home')">Next Update </button>
    <button class="nav-btn" style="background: var(--neon-purple);" onclick="openLab()">🧪Reaction Lab</button>
    
    <div class="sidebar-title" style="margin-top: 30px;">Developer Info</div>
    <p style="font-size: 14px; margin: 0; color: var(--neon-blue);">MRM MD MUN</p>

</div>

<div id="search-container">
    <input type="text" id="el-search" placeholder="Search The Element...">
</div>

<div id="data-display">
    <h2 id="m-name" style="color: var(--neon-blue); margin: 0; font-size: 1.2rem;">-</h2>
    <p id="m-sym" style="font-size: 24px; font-weight: bold; margin: 5px 0;">-</p>
    <div id="m-shell-val" style="background: rgba(0,210,255,0.1); padding: 8px; border-radius: 8px; font-size: 13px;">-</div>
    <p id="m-desc" style="font-size: 13px; color: #ccc; margin-top: 10px;">-</p>
</div>

<div id="lab-overlay">
    <span onclick="closeLab()" style="position: absolute; right: 20px; top: 10px; font-size: 35px; cursor: pointer;">&times;</span>
    <div class="reaction-container">
        <h2 style="color: var(--neon-blue);">Chemistry Lab</h2>
        <div class="box-grid">
            <input type="text" id="react-1" class="chem-box" placeholder="Element 1">
            <span style="font-size: 25px;">+</span>
            <input type="text" id="react-2" class="chem-box" placeholder="Element 2">
            <span style="font-size: 25px;">=</span>
            <div id="react-result" class="result-box">Results</div>
        </div>
        <button onclick="runReaction()" style="margin-top: 15px; padding: 10px 25px; border-radius: 20px; background: var(--neon-blue); border: none; font-weight: bold;">Results...</button>
        
        <div style="text-align: left; background: var(--glass); padding: 15px; border-radius: 12px; margin-top: 20px;">
            <h4 id="res-title" style="margin: 0; color: var(--neon-purple);">Description:</h4>
            <p id="res-desc" style="font-size: 14px; color: #ddd;"></p>
            <p style="color: #ffaa00; font-size: 12px; font-weight: bold;"></p>
        </div>

        <div id="reaction-3d-canvas">
             <p style="text-align: center; padding-top: 80px; color: #444;">3D Animation Loading Area</p>
        </div>
    </div>
</div>

    "description": "সালফার ডাই অক্সাইড অক্সিজেনের সাথে বিক্রিয়া করে সালফার ট্রাই অক্সাইড তৈরি করে (সালফিউরিক অ্যাসিড তৈরির ধাপ)।",
    "type": "Oxidation"
  },
  {
    "elements": ["BaCl2", "Na2SO4"],
    "product": "BaSO4 + NaCl",
    "description": "বেরিয়াম ক্লোরাইড এবং সোডিয়াম সালফেট বিক্রিয়া করে বেরিয়াম সালফেটের সাদা অধঃক্ষেপ তৈরি করে।",
    "type": "Double Displacement"
  },
  {
    "elements": ["Fe", "S"],
    "product": "FeS",
    "description": "আয়রন এবং সালফারের মিশ্রণকে উত্তপ্ত করলে আয়রন সালফাইড তৈরি হয়।",
    "type": "Synthesis"
  },  {
    "elements": ["C2H4", "H2"],
    "product": "C2H6",
    "description": "ইথিন এবং হাইড্রোজেনের বিক্রিয়ায় ইথেন তৈরি হয় (হাইড্রোজেনেশন বিক্রিয়া)।",
    "type": "Addition"
  },
  {
    "elements": ["N2", "O2"],
    "product": "NO",
    "description": "বজ্রপাতের সময় উচ্চ তাপমাত্রায় বাতাসে নাইট্রোজেন এবং অক্সিজেন বিক্রিয়া করে নাইট্রিক অক্সাইড তৈরি করে।",
    "type": "Synthesis"
  },
  {
    "elements": ["CO", "H2"],
    "product": "CH3OH",
    "description": "কার্বন মনোক্সাইড এবং হাইড্রোজেনের বিক্রিয়ায় মিথানল তৈরি হয়।",
    "type": "Synthesis"
  },
  {
    "elements": ["Cl2", "H2O"],
    "product": "HCl + HOCl",
    "description": "ক্লোরিন পানির সাথে বিক্রিয়া করে হাইড্রোক্লোরিক অ্যাসিড এবং হাইপোক্লোরাস অ্যাসিড তৈরি করে (পানি জীবাণুমুক্ত করতে ব্যবহৃত হয়)।",
    "type": "Disproportionation"
  },
  {
    "elements": ["HgO"],
    "product": "Hg + O2",
    "description": "মারকিউরিক অক্সাইডকে উত্তপ্ত করলে এটি ভেঙে পারদ এবং অক্সিজেন তৈরি করে।",
    "type": "Decomposition"
  },
  {
    "elements": ["Si", "O2"],
    "product": "SiO2",
    "description": "সিলিকন অক্সিজেনের সাথে বিক্রিয়া করে সিলিকা বা বালু তৈরি করে।",
    "type": "Synthesis"
  },
  {
    "elements": ["F2", "H2"],
    "product": "HF",
    "description": "ফ্লোরিন এবং হাইড্রোজেন অন্ধকারের মধ্যেও অত্যন্ত তীব্রভাবে বিক্রিয়া করে হাইড্রোজেন ফ্লোরাইড তৈরি করে।",
    "type": "Synthesis"
  },
  {
    "elements": ["Zn", "CuSO4"],
    "product": "ZnSO4 + Cu",
    "description": "জিঙ্ক কপার সালফেট দ্রবণ থেকে কপারকে সরিয়ে দিয়ে নিজে জিঙ্ক সালফেট তৈরি করে।",
    "type": "Single Displacement"
  },
  
  
  
  
    
    
    ];

    // --- UI লজিক ---
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function openLab() { document.getElementById('lab-overlay').style.display = 'block'; toggleSidebar(); }
    function closeLab() { document.getElementById('lab-overlay').style.display = 'none'; }

    // --- Three.js ইঞ্জিন ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 50;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio); // হাই-কোয়ালিটি রেন্ডারিং
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    const atomGroup = new THREE.Group();
    scene.add(atomGroup);

    function buildModel(el) {
        while(atomGroup.children.length > 0) atomGroup.remove(atomGroup.children[0]);
        // নিউক্লিয়াস
        atomGroup.add(new THREE.Mesh(new THREE.SphereGeometry(3, 32, 32), new THREE.MeshPhongMaterial({color: 0xff3300})));
        
        let rad = 12;
        el.shells.forEach((count, i) => {
            // কক্ষপথ
            const ring = new THREE.Mesh(new THREE.TorusGeometry(rad, 0.05, 16, 100), new THREE.MeshBasicMaterial({color: 0x00d2ff, transparent:true, opacity:0.3}));
            ring.rotation.x = Math.PI/2;
            atomGroup.add(ring);
            // ইলেকট্রন
            for(let j=0; j<count; j++){
                const e = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 16), new THREE.MeshPhongMaterial({color: 0xffffff}));
                e.userData = { angle: (j/count)*Math.PI*2, speed: 0.02/(i+1), radius: rad };
                atomGroup.add(e);
            }
            rad += 8;
        });
        updateUI(el);
    }

    function updateUI(el) {
        document.getElementById('data-display').style.display = 'block';
        document.getElementById('m-name').innerText = el.name;
        document.getElementById('m-sym').innerText = el.sym;
        document.getElementById('m-shell-val').innerText = "ইলেকট্রন বিন্যাস: " + el.shells.join(", ");
        document.getElementById('m-desc').innerText = el.desc;
    }

    function runReaction() {
        const r1 = document.getElementById('react-1').value.toLowerCase().trim();
        const r2 = document.getElementById('react-2').value.toLowerCase().trim();
        const match = reactionDB.find(x => (x.r1 === r1 && x.r2 === r2) || (x.r1 === r2 && x.r2 === r1));
        if(match) {
            document.getElementById('react-result').innerText = match.result;
            document.getElementById('res-desc').innerText = match.desc;
        } else {
            document.getElementById('react-result').innerText = "???";
            document.getElementById('res-desc').innerText = "এই বিক্রিয়াটি ডাটাবেজে নেই।";
        }
    }

    // রেসপন্সিভ উইন্ডো রিসাইজ
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const light = new THREE.PointLight(0xffffff, 1.2);
    light.position.set(20, 20, 50);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6), light);

    function animate() {
        requestAnimationFrame(animate);
        atomGroup.children.forEach(c => {
            if(c.userData.speed){
                c.userData.angle += c.userData.speed;
                c.position.x = Math.cos(c.userData.angle) * c.userData.radius;
                c.position.z = Math.sin(c.userData.angle) * c.userData.radius;
            }
        });
        controls.update();
        renderer.render(scene, camera);
    }

    // সার্চ ইনপুট লজিক
    document.getElementById('el-search').addEventListener('input', (e) => {
        const v = e.target.value.toLowerCase();
        const res = elementDB.find(el => el.name.toLowerCase().includes(v) || el.sym.toLowerCase() === v || el.num == v);
        if(res) buildModel(res);
    });

    buildModel(elementDB[0]);
    animate();

</script>
</body>
</html>
